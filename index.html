const tryPlay = () => {
const promise = video.play();
if (promise && typeof promise.catch === 'function') {
            promise.catch(() => {
              video.controls = false;
            });
            promise.catch(() => {});
}
};

video.addEventListener('loadedmetadata', tryPlay, { once: true });
video.addEventListener('canplay', tryPlay, { once: true });

const observer = new IntersectionObserver((entries) => {
entries.forEach((entry) => {
if (entry.isIntersecting) {
tryPlay();
} else {
video.pause();
}
});
}, { threshold: 0.35 });

observer.observe(video);
}
}

function distanceMiles(lat1, lon1, lat2, lon2) {
const toRad = d => d * Math.PI / 180;
const R = 3958.8;
const dLat = toRad(lat2 - lat1);
const dLon = toRad(lon2 - lon1);
const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

document.getElementById('nearbyBtn').addEventListener('click', () => {
const box = document.getElementById('nearbyResults');

if (!navigator.geolocation) {
box.innerHTML = '<div class="result">This browser does not support geolocation.</div>';
return;
}

box.innerHTML = '<div class="result">Finding festivals near you…</div>';

navigator.geolocation.getCurrentPosition(
pos => {
const { latitude, longitude } = pos.coords;
const ranked = festivals
.map(f => ({ ...f, distance: distanceMiles(latitude, longitude, f.lat, f.lng) }))
.sort((a, b) => a.distance - b.distance)
.slice(0, 3);

box.innerHTML = ranked.map(f =>
'<div class="result"><strong>' + f.name + '</strong><br>' +
f.city + ', ' + f.county + '<br><span style="color:#6a5b49;">' +
f.distance.toFixed(1) + ' miles away · ' + f.text + '</span></div>'
).join('');

box.scrollIntoView({ behavior: 'smooth', block: 'start' });
},
() => {
box.innerHTML = '<div class="result">Location was blocked or unavailable. You can still browse by theme or search.</div>';
box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
);
});

function runSearch() {
const q = document.getElementById('archiveSearch').value.trim().toLowerCase();
const box = document.getElementById('searchResults');

if (!q) {
box.innerHTML = '<div class="result">Try searching for <strong>St. Clair County</strong>, <strong>waterfront</strong>, or <strong>July</strong>.</div>';
return;
}

const results = festivals.filter(f => {
const hay = [f.name, f.city, f.county, f.type, f.month, f.text].join(' ').toLowerCase();
return hay.includes(q);
});

if (!results.length) {
box.innerHTML = '<div class="result">No matches yet. Try a city, county, month, or festival type.</div>';
return;
}

box.innerHTML = results.map(f =>
'<div class="result"><strong>' + f.name + '</strong><br>' +
f.city + ', ' + f.county + '<br><span style="color:#6a5b49;">' +
f.text + '</span></div>'
).join('');
}

renderFeaturedFestival();
