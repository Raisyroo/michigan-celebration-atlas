<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Michigan Celebration Atlas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header style="background:#2a4c73;color:white;text-align:center;padding:40px;">
<h1>The Michigan Celebration Atlas</h1>
<p>Exploring the fairs, festivals, and traditions that shaped Michigan communities.</p>
</header>

<section style="padding:30px">

<h2>Featured Festivals</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;">

<div style="background:white;border-radius:8px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.1)">
<img src="https://picsum.photos/400/500" style="width:100%">
<h3 style="margin:10px">Goodells County Fair</h3>
<p style="margin:0 10px 10px">St Clair County</p>
</div>

<div style="background:white;border-radius:8px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.1)">
<img src="https://picsum.photos/400/501" style="width:100%">
<h3 style="margin:10px">Armada Fair</h3>
<p style="margin:0 10px 10px">Macomb County</p>
</div>

<div style="background:white;border-radius:8px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.1)">
<img src="https://picsum.photos/400/502" style="width:100%">
<h3 style="margin:10px">Bay-Rama Fishfly Festival</h3>
<p style="margin:0 10px 10px">New Baltimore</p>
</div>

</div>

</section>

</html>
